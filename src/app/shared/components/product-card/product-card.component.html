<div class="card h-100 border-secondary-subtle shadow-sm rounded-4 overflow-hidden position-relative" style="transition: transform 0.2s, border-color 0.2s;">
  
  <div class="ratio ratio-4x3 bg-light d-flex align-items-center justify-content-center overflow-hidden">
    @if (product.image) {
      <img [src]="product.image" [alt]="product.name" class="img-fluid object-fit-cover w-100 h-100" loading="lazy" />
    } @else {
      <div class="w-100 h-100 d-flex flex-column align-items-center justify-content-center gap-2 p-3 text-center text-muted">
        <span class="material-icons-outlined fs-1">inventory_2</span>
        <span class="text-uppercase tracking-wide small fw-semibold" style="font-size: 11px;">Sin imagen</span>
      </div>
    }
  </div>

  <div class="card-body p-3 d-flex flex-column justify-content-between">
    <div>
      <div class="text-uppercase fw-bold text-success mb-1" style="font-size: 11px; letter-spacing: 0.05em;">
        {{ product.category }}
      </div>
      
      <h5 class="card-title fw-semibold text-dark mb-1 text-truncate" style="font-size: 1rem;">
        {{ product.name }}
      </h5>
      
      <div class="text-dark fw-bold fs-5 my-1">
        S/ {{ currentMinPrice | number:'1.2-2' }}
      </div>
      
      <div class="text-muted mb-2" style="font-size: 12px;">
        {{ product.brand }} • {{ product.unit }}
      </div>
      
      <div class="text-muted mb-3" style="font-size: 12px;">
        MOQ {{ product.moq }} • Stock {{ product.stock }}
      </div>
    </div>

    <div class="d-flex align-items-center gap-2 mt-auto">
      <button type="button" class="btn btn-success flex-grow-1 fw-medium py-2 rounded-3" (click)="onAddToCart()">
        Agregar
      </button>
    </div>
  </div>
</div>
